{% extends 'base.html' %}
{% load static %}

{% block title %}Login - Campus SkillSwap{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body p-5">
                <h2 class="card-title text-center mb-4">
                    <i class="fas fa-sign-in-alt"></i> Log In
                </h2>
                
                <form method="POST">
                    {% csrf_token %}
                    
                    <!-- Username field -->
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input 
                            type="text" 
                            class="form-control" 
                            id="username" 
                            name="username" 
                            placeholder="Enter your username"
                            required
                        >
                    </div>
                    
                    <!-- Password field -->
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input 
                            type="password" 
                            class="form-control" 
                            id="password" 
                            name="password" 
                            placeholder="Enter your password"
                            required
                        >
                    </div>
                    
                    <!-- Submit button -->
                    <button type="submit" class="btn btn-primary w-100 mb-3">
                        <i class="fas fa-sign-in-alt"></i> Log In
                    </button>
                </form>
                
                <!-- Link to register -->
                <p class="text-center">
                    Don't have an account? 
                    <a href="{% url 'register' %}" class="text-primary fw-bold">Sign up here</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
